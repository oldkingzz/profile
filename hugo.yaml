                  Developed a high-fidelity teleoperation system for multi-axis manipulators with advanced control algorithms.

                  - Designed and simulated teleoperation system in MATLAB/Simulink with motor FOC algorithms
                  - Resolved critical instability by re-architecting from impedance to admittance control model
                  - Integrated torque sensor feedback to achieve stable, high-sensitivity force replication
                  - Developed C++ host-computer application for robust CAN bus communication with ~30 motors
                featuredItems:
