              开发了一种新型深度学习策略，用于不同工况下的机械故障检测。

              **发表：** IEEE MEAE 2024 (第一作者)

              - 使用 PyTorch 架构了端到端的深度学习管线（CNN/TCN + Transformer），从时间序列传感器数据中诊断机械故障
              - 通过引入可迁移领域自适应网络 (TDAN) 和 TS2Vec，解决了关键的“领域偏移”问题（适应不断变化的运行工况）
              - 量化了模型性能，在未知目标领域实现了 88.27% 的准确率，较基准线绝对提升了 40.6%

