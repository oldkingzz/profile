            content: |
              Founded and led the development of a complete autonomous robot system from scratch as Control Leader of the Robocon team.

              **Role:** Founder & Control Leader (Sep 2022 - Present)

              - Architected autonomous system with Point-LIO SLAM (< 0.003m drift/3min)
              - Implemented YOLO pipeline for 20 FPS real-time object detection on embedded NUC
              - Developed STM32-based control system with PID and Mecanum wheel kinematics
              - Led 20 interdisciplinary members and trained 60+ new members

          - title: Multi-Domain Adaptive Fault Detection (IEEE Publication)
            image: /images/projects/MEAE.png
            badges:
              - "Deep Learning"
              - "Python"
              - "PyTorch"
              - "Signal Processing"
            links:
              - icon: fas fa-file-pdf
                url: "https://ieeexplore.ieee.org/document/11026598"
            content: |
              Developed a novel deep learning strategy for mechanical fault detection across different operating conditions.

              **Publication:** IEEE MEAE 2024 (First Author)

              - Architected an end-to-end deep learning pipeline in PyTorch with CNN/TCN and transformer to diagnose mechanical faults from time-series sensor data
              - Solved the critical "domain shift" problem (varying operating conditions) by implementing a Transferable Domain Adaptation Network (TDAN) and TS2Vec for accelerating training
              - Quantified model performance, achieving 88.27% accuracy on the unseen target domain—a +40.6% absolute improvement over the baseline

