      # ==================== ABOUT SECTION ====================
      about:
        enable: true
        title: "关于我"
        image: "/images/me.jpg"
        content: |-
          我目前是宾夕法尼亚大学 (University of Pennsylvania) 的硕士研究生，攻读机械工程与应用力学 (MEAN)，方向为机电一体化与机器人。

          我致力于构建能够弥合理论控制算法与现实应用之间鸿沟的智能化机器人系统。我在 ROS 系统架构、嵌入式控制和自主导航方面拥有丰富的实践经验。

          作为华东理工大学 Robocon 战队的创始人和控制组组长，我曾带领 20 名跨学科成员从零开发出一套完整的自主机器人系统，实现了高精度的 SLAM 导航和实时目标检测。
