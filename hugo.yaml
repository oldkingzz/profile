              作为 Robocon 战队的控制组组长，从零开始领导开发了一套完整的自主机器人系统。

              **角色：** 创始人 & 控制组组长 (2022年9月 - 至今)

              - 架构了基于 Point-LIO 的 SLAM 自主系统（3分钟漂移 < 0.003m）
              - 在嵌入式 NUC 上实现了 YOLO 流线，达到 20 FPS 的实时目标检测
