          title: "技术栈与工具："
          items:
            - "ROS2 & Navigation Stack"
            - "C++ / Python / Rust"
            - "MATLAB & Simulink"
            - "嵌入式系统 (STM32)"
            - "计算机视觉 (YOLO, OpenCV)"
            - "Linux & Git/CMake"
            - "CAD (Fusion360, Creo)"
            - "控制理论 & SLAM"

      # ==================== EXPERIENCE SECTION ====================
      experience:
        enable: true
        title: "工作经验"
        items:
          - company: "上海宇集科技 (Shanghai Uji Technology)"
            jobs:
              - name: "机器人控制实习生"
                date: "2024年7月 - 2024年9月"
                content: |
                  为多轴机械臂开发了高保真远端操作（Teleoperation）系统及先进控制算法。

                  - 在 MATLAB/Simulink 中设计并仿真了基于电机 FOC 算法的远操系统
                  - 通过将阻抗控制（Impedance）重构为导纳控制（Admittance）模型，解决了关键的不稳定性问题
                  - 集成力矩传感器反馈，实现了稳定且高灵敏度的力反馈复制
                  - 开发了 C++ 上位机程序，通过 CAN 总线实现与约 30 台电机的稳定通信
